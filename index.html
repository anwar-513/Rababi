<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <title> Rababi</title>
    <link rel="icon" type="jfif" href="rabab.jfif">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Galindo&display=swap" rel="stylesheet">
</head>

<body>

    <nav class="top">
        <ul class="brand">
            <li class="image"> <img src="rabab.jfif"> </li>
            <li class="name">Rababi</li>
        </ul>
    </nav>

    <div class="mainBox">
        <h1>Yadoun ki Donya</h1>
        <div class="songList"> <img class="backgound" alt="backgroundImage" src="bg.jpg"> </div>

    </div>

    <div class="buttom">
        <input type="range" name="range" id="progressbar" min="o" max="100">
        <div class="songName"></div>
        <div class="icons">
            <ul>
                <li class="backword icon"> <img src="icons/backward-solid-full.svg" alt="backword" width="25"> </li>
                <li class="play icon"> <img src="icons/play-solid-full.svg" alt="play" width="25"> </li>
                <li class="forward icon"> <img src="icons/forward-solid-full.svg" alt="forward" width="25"> </li>

                <div class="soundBar xicon"> <input type="range" name="soundBar" id="soundBar">
                    <h5>Volume </h5>
                </div>
            </ul>
        </div>
    </div>

    <script src="rababi.js"></script>
</body>

</html>
