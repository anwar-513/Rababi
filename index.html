<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <title> Rababi</title>
    <link rel="icon" type="jfif" href="rabab.jfif">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Galindo&display=swap" rel="stylesheet">
</head>

<body>

    <nav class="top">
        <ul class="brand">
            <li class="brandImage"> <img src="rabab.jfif"> </li>
            <li class="name">Rababii</li>
        </ul>
    </nav>

    <div class="mainBox">
        <div class="playlist">
            <h1>YadGar-e-Donya</h1>

            <div class="songItem">
                <img class="song" src="covers/1.jfif" alt="1">
                <span class="itamName"> Aman Tappy - Azhar Khan</span>
                <span class="songlistplay"></span>
                <img src="gif.gif" alf="gif" id="gif"><span class="songTime">08:38</span> <i id="play-pause-btn"> <img
                        id="btn-icon" class="icon" src="icons/play-solid-full.svg" alt="play" width="20"> </i>
                </span>
            </div>
            <div class="songItem">
                <img src="covers/2.png" alt="2">
                <span class="itamName">Stargy Ghazzal - Haroon Bacha</span>
                <span class="songlistplay"></span>
                <img src="gif.gif" alf="gif" id="gif"> <span class="songTime">06:14</span> <i id="play-pause-btn"> <img
                        id="btn-icon" class="icon" src="icons/play-solid-full.svg" alt="play" width="20"> </i>
                </span>
            </div>
            <div class="songItem">
                <img src="covers/3.jfif" alt="3">
                <span class="itamName">Liwany Azhar Khan</span>
                <span class="songlistplay"></span>
                <img src="gif.gif" alf="gif" id="gif"> <span class="songTime">05:41</span> <i id="play-pause-btn"> <img
                        id="btn-icon" class="icon" src="icons/play-solid-full.svg" alt="play" width="20"> </i>
                </span>
            </div>
        </div>
    </div>


    <div class="buttom">
        <input type="range" name="range" id="progressbar" value="0" min="0" max="100">
        <div class="songName">
            <img src="gif.gif" alf="gif" id="gif">
            <span> Aman Tappy - Azhar khan</span>
        </div>
        <ul class="icons">
            <li class="backStep icon"> <img src="icons/backward-solid-full.svg" alt="backStep" id="backStep" width="25">
            </li>
            <li class="backword icon"> <img src="icons/backward-step.svg" alt="backward" id="backward" width="25"></li>
            <li class="play icon"> <img src="icons/play-solid-full.svg" alt="play" id="playIcon" width="25"> </li>
            <li class="forward icon"> <img src="icons/forward-step.svg" alt="forward" id="forward" width="25"></li>
            <li class="nextStep icon"> <img src="icons/forward-solid-full.svg" alt="nextStep" id="nextStep" width="25">
            </li>
        </ul>
        <div class="soundBar xicon"> <input type="range" name="soundBar" id="soundBar" min="0" max="100">
            <h5>Volume </h5>
        </div>
    </div>
    </div>

    <script src="rababi.js"></script>
</body>

</html>
